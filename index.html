<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biology 20: Respiration Practice</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="quiz-container">
        <h1>Biology 20: Ch.9 Respiratory and Motor Systems Pretest</h1>
        <div id="quiz-content">
            <h2 id="question-text">Question goes here</h2>
            <div id="options-container"></div>
            <div id="feedback-container" class="hidden">
                <p id="rationale-text"></p>
                <p id="hint-text"></p>
                <button id="next-btn">Next Question</button>
            </div>
        </div>
        <div id="results-container" class="hidden">
            <h2>Quiz Complete!</h2>
            <p id="score-text"></p>
            <button id="restart-btn">Restart Quiz</button>
        </div>
        <div class="progress">Question <span id="current-q-num">1</span> of <span id="total-q-num">28</span></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
